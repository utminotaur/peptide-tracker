<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2028"/>
      <stop offset="1" stop-color="#0f1419"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="syringe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6edf3"/>
      <stop offset="1" stop-color="#8b98a9"/>
    </linearGradient>
  </defs>
  <!-- Maskable safe zone: inner 80% -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Capsule pill, rotated -->
  <g transform="translate(256 256) rotate(-30)">
    <rect x="-150" y="-58" width="300" height="116" rx="58" fill="url(#pill)"/>
    <rect x="-3" y="-58" width="6" height="116" fill="#0f1419" opacity="0.55"/>
    <!-- gloss highlight -->
    <rect x="-130" y="-46" width="260" height="14" rx="7" fill="#ffffff" opacity="0.18"/>
  </g>

  <!-- Small syringe accent -->
  <g transform="translate(140 380) rotate(-20)">
    <rect x="0" y="-9" width="92" height="18" rx="4" fill="url(#syringe)" opacity="0.85"/>
    <rect x="92" y="-4" width="32" height="8" rx="2" fill="url(#syringe)" opacity="0.85"/>
    <rect x="-22" y="-12" width="22" height="24" rx="3" fill="#a78bfa" opacity="0.9"/>
  </g>
</svg>
